name: Deploy — imprsn8 (imprsn8.com)

on:
  push:
    branches: [master]
    paths:
      - "packages/imprsn8/**"
      - "packages/frontend/**"
      - ".github/workflows/deploy-imprsn8.yml"
  workflow_dispatch:

concurrency:
  group: deploy-imprsn8-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (worker)
        working-directory: packages/imprsn8
        run: pnpm typecheck

      - name: Type check (frontend)
        working-directory: packages/frontend
        run: pnpm typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    needs: typecheck
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: packages/frontend
        run: pnpm build:imprsn8

      - name: Inject resource IDs into wrangler.toml
        working-directory: packages/imprsn8
        env:
          IMPRSN8_D1_DATABASE_ID: ${{ secrets.IMPRSN8_D1_DATABASE_ID }}
          IMPRSN8_KV_NAMESPACE_ID: ${{ secrets.IMPRSN8_KV_NAMESPACE_ID }}
        run: envsubst < wrangler.toml > wrangler.toml.tmp && mv wrangler.toml.tmp wrangler.toml

      - name: Run DB migrations (production)
        working-directory: packages/imprsn8
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run db:migrate:prod

      - name: Deploy Worker + Assets
        working-directory: packages/imprsn8
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy
