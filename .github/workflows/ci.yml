name: CI — All Packages

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-workers:
    name: TypeCheck Workers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [trust-radar, imprsn8]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: packages/${{ matrix.package }}
        run: pnpm typecheck

      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: pnpm test
        if: matrix.package == 'trust-radar'

  test-react-ui:
    name: Test React UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run React UI tests
        working-directory: packages/averrow-ui
        run: pnpm test
