name: Set Secret — ABUSE_UNSUBSCRIBE_SECRET (averrow)

# One-shot, manually dispatched. Generates a cryptographically random
# value INSIDE the runner and pipes it directly to `wrangler secret put`
# on the averrow Worker. The value is never echoed, never stored in
# GitHub, and never known to any human — it's an internal HMAC key for
# abuse-mailbox unsubscribe links (audit finding L5), so nothing else
# ever needs to read it. Re-dispatching rotates the key (old unsubscribe
# links stop verifying — acceptable for this mailbox flow).

on:
  workflow_dispatch:

concurrency:
  group: set-abuse-unsubscribe-secret
  cancel-in-progress: false

jobs:
  set-secret:
    name: Generate + set secret
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate and set ABUSE_UNSUBSCRIBE_SECRET
        working-directory: packages/averrow-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Pipe directly: the value never touches the log or the filesystem.
          openssl rand -hex 32 | npx wrangler secret put ABUSE_UNSUBSCRIBE_SECRET
