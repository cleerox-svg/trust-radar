name: Deploy — Trust Radar (trustradar.ca)

on:
  push:
    branches: [master, main]
    paths:
      - "packages/trust-radar/**"
      - "packages/averrow-ui/**"
      - ".github/workflows/deploy-radar.yml"
  workflow_dispatch:

concurrency:
  group: deploy-radar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (worker)
        working-directory: packages/trust-radar
        run: pnpm typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    needs: typecheck
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build React UI
        working-directory: packages/averrow-ui
        run: pnpm run build

      - name: Run DB migrations (production)
        working-directory: packages/trust-radar
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm run db:migrate:prod
          pnpm run db:migrate:audit:prod

      - name: Deploy Worker + Assets
        working-directory: packages/trust-radar
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy
