name: Deploy — Averrow Worker

# Canonical production deploy for the Averrow Worker.
#
# Builds the averrow-ops React SPA (formerly averrow-ui, rebadged
# in v3 Phase D2) before wrangler deploy so the /v2/* assets land
# in packages/averrow-worker/public/v2/ before the worker bundle is
# shipped. That directory is gitignored — without this build step
# the deployed worker has no SPA assets and every /v2/* path
# returns 404 (ERR_INVALID_RESPONSE).
#
# A separate Cloudflare Workers Build Git integration exists; this
# workflow is the source of truth for production deploys.
#
# Manual retrigger 2026-05-04: PR #1001 merge produced no path-filter
# changes (content was already on master from a prior force-push),
# so Deploy was skipped. This touch reactivates the deploy chain.

on:
  push:
    branches: [master, main]
    paths:
      - "packages/averrow-worker/**"
      - "packages/averrow-ops/**"
      - "packages/averrow-tenant/**"
      - "packages/averrow-marketing/**"
      - ".github/workflows/deploy-radar.yml"
  workflow_dispatch:

concurrency:
  group: deploy-radar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (worker)
        working-directory: packages/averrow-worker
        run: pnpm typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    needs: typecheck
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build React UI (averrow-ops — staff /v2)
        working-directory: packages/averrow-ops
        run: pnpm run build

      - name: Build React UI (averrow-tenant — customer /tenant)
        working-directory: packages/averrow-tenant
        run: pnpm run build

      # Astro marketing site (averrow.com /). Builds Astro, then runs
      # generate-sitemap.mjs + sync-to-worker.mjs which overlay-copy
      # the artifacts into packages/averrow-worker/public/. Without this
      # step the Worker deploys with no Astro output and every public
      # page falls through to the dashboard.html SPA fallback in
      # routes/public.ts:356. Added 2026-05 after R7 cutover went
      # live missing this step — see docs/archive/audit-screenshots-2026-05/r8-*.png.
      - name: Build Astro marketing site (@averrow/marketing — /)
        working-directory: packages/averrow-marketing
        run: pnpm run build

      - name: Run DB migrations (production)
        working-directory: packages/averrow-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          migrate_with_retry() {
            local cmd="$1"
            local label="$2"
            for i in 1 2 3 4; do
              if $cmd; then return 0; fi
              echo "$label attempt $i failed, retrying in $((i * 4))s..."
              sleep $((i * 4))
            done
            echo "::error::$label failed after 4 attempts"
            return 1
          }
          migrate_with_retry "pnpm run db:migrate:prod" "DB migration"
          migrate_with_retry "pnpm run db:migrate:audit:prod" "Audit migration"
          # Side DBs were historically hand-migrated (no d1_migrations
          # tracking) and absent from CI — which is how geoip migration
          # 0002 sat unapplied and broke every refresh. Their tracking
          # tables have been seeded to mark already-applied migrations so
          # these applies are no-ops until a NEW migration lands.
          migrate_with_retry "pnpm run db:migrate:geoip:prod" "GeoIP migration"
          migrate_with_retry "pnpm run db:migrate:dnsq:prod" "DNS-queue migration"

      # PR-AI: post-migration seed verification. wrangler reports
      # `migrations apply` as successful when statements don't error,
      # even if INSERT OR IGNORE silently no-op'd. This step asserts
      # specific seeded rows exist after migration and fails the
      # workflow loudly when they don't. Add new assertions for each
      # new migration that seeds data. See scripts/verify-db-seed.ts.
      - name: Verify seeded rows landed
        working-directory: packages/averrow-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run db:verify:prod

      # Drift visibility — surface applied/pending migrations in the
      # workflow log so a human glancing at the deploy can spot any
      # pending migrations at a glance.
      - name: Show migration status
        working-directory: packages/averrow-worker
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run db:migrate:status:prod || true

      - name: Deploy Worker + Assets
        working-directory: packages/averrow-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy
