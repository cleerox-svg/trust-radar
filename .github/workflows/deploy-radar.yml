name: Deploy — Trust Radar (trustradar.ca)

# Canonical production deploy for Trust Radar / Averrow.
#
# Builds the averrow-ui React SPA before wrangler deploy so the
# /v2/* assets land in packages/trust-radar/public/v2/ before the
# worker bundle is shipped. That directory is gitignored — without
# this build step the deployed worker has no SPA assets and every
# /v2/* path returns 404 (ERR_INVALID_RESPONSE).
#
# A separate Cloudflare Workers Build Git integration exists; this
# workflow is the source of truth for production deploys.

on:
  push:
    branches: [master, main]
    paths:
      - "packages/trust-radar/**"
      - "packages/averrow-ui/**"
      - ".github/workflows/deploy-radar.yml"
  workflow_dispatch:

concurrency:
  group: deploy-radar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (worker)
        working-directory: packages/trust-radar
        run: pnpm typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    needs: typecheck
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build React UI
        working-directory: packages/averrow-ui
        run: pnpm run build

      - name: Run DB migrations (production)
        working-directory: packages/trust-radar
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          migrate_with_retry() {
            local cmd="$1"
            local label="$2"
            for i in 1 2 3 4; do
              if $cmd; then return 0; fi
              echo "$label attempt $i failed, retrying in $((i * 4))s..."
              sleep $((i * 4))
            done
            echo "::error::$label failed after 4 attempts"
            return 1
          }
          migrate_with_retry "pnpm run db:migrate:prod" "DB migration"
          migrate_with_retry "pnpm run db:migrate:audit:prod" "Audit migration"

      - name: Deploy Worker + Assets
        working-directory: packages/trust-radar
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TRUST_RADAR_IMPRSN8 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy
