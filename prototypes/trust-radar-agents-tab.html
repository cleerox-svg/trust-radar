<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg-void:#040810;--bg-surface:#0a1020;--bg-panel:#0d1528;--bg-elevated:#111d35;--bg-hover:#152545;--blue-primary:#00d4ff;--blue-muted:#0091b3;--blue-glow:rgba(0,212,255,.08);--blue-border:rgba(0,212,255,.15);--blue-border-bright:rgba(0,212,255,.35);--threat-critical:#ff3b5c;--threat-high:#ff6b35;--threat-medium:#ffb627;--positive:#00e5a0;--positive-muted:rgba(0,229,160,.12);--negative:#ff3b5c;--negative-muted:rgba(255,59,92,.12);--purple:#b388ff;--purple-dim:rgba(138,43,226,.12);--text-primary:#e8edf5;--text-secondary:#7a8ba8;--text-tertiary:#4a5a73;--text-accent:#00d4ff;--font-display:'Chakra Petch',sans-serif;--font-body:'Outfit',sans-serif;--font-mono:'IBM Plex Mono',monospace;--radius:6px;--radius-lg:10px}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bg-surface);border-bottom:1px solid var(--blue-border);z-index:100}
.topbar-left{display:flex;align-items:center;gap:20px}
.logo{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--text-primary);display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-icon{width:28px;height:28px;border-radius:50%;border:2px solid var(--blue-primary);display:flex;align-items:center;justify-content:center}
.logo-icon::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--blue-primary);animation:pc 2s ease-in-out infinite}
@keyframes pc{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.5)}}
.logo span{color:var(--blue-primary)}.nav-pills{display:flex;gap:2px;background:var(--bg-panel);padding:3px;border-radius:var(--radius)}
.np{font-family:var(--font-body);font-size:11px;font-weight:500;padding:5px 13px;border-radius:4px;border:none;background:0 0;color:var(--text-secondary);cursor:pointer;transition:all .2s}.np.active{background:var(--bg-elevated);color:var(--text-accent)}.np:hover:not(.active){color:var(--text-primary)}
.topbar-right{display:flex;align-items:center;gap:14px}.feed-st{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;color:var(--positive)}.fd{width:5px;height:5px;border-radius:50%;background:var(--positive);animation:pc 2s ease-in-out infinite}
.live-tag{font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--blue-primary);padding:3px 9px;border:1px solid var(--blue-border-bright);border-radius:3px}
.ua{width:30px;height:30px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--blue-primary);cursor:pointer}
.main{overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:var(--bg-elevated) transparent}.main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:3px}
.agg{display:flex;gap:12px;margin-bottom:20px}.ac{flex:1;background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);padding:14px 16px}
.ac-v{font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1}.ac-l{font-size:10px;color:var(--text-tertiary);margin-top:4px}.ac-s{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:2px}

.agent-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}@media(max-width:1200px){.agent-grid{grid-template-columns:repeat(3,1fr)}}
.agent-card{background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all .2s;position:relative}
.agent-card:hover{border-color:var(--blue-border-bright);background:var(--bg-panel);transform:translateY(-2px)}.agent-card.selected{border-color:var(--blue-primary);background:var(--bg-panel)}
.agent-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.agent-icon{width:40px;height:40px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agent-icon.sentinel{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2)}
.agent-icon.analyst{background:var(--purple-dim);border:1px solid rgba(138,43,226,.2)}
.agent-icon.cartographer{background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.2)}
.agent-icon.strategist{background:var(--negative-muted);border:1px solid rgba(255,59,92,.2)}
.agent-icon.observer{background:var(--positive-muted);border:1px solid rgba(0,229,160,.2)}
.agent-name-block{flex:1;min-width:0}.agent-name{font-family:var(--font-display);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-role{font-size:9px;color:var(--text-tertiary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-dot{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%}
.status-dot.active{background:var(--positive);animation:pc 2s ease-in-out infinite}.status-dot.idle{background:var(--blue-primary)}.status-dot.degraded{background:var(--threat-medium);animation:pc 1.5s ease-in-out infinite}.status-dot.error{background:var(--negative);animation:pc 1s ease-in-out infinite}
.agent-stats{display:flex;gap:12px;margin-bottom:12px}.as{text-align:center;flex:1}.as-v{font-family:var(--font-display);font-weight:700;font-size:16px;line-height:1}.as-l{font-size:8px;color:var(--text-tertiary);margin-top:2px}
.agent-last{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-bottom:8px;display:flex;justify-content:space-between}
.activity-bar{display:flex;gap:1px;height:16px;border-radius:3px;overflow:hidden}.activity-seg{flex:1;min-width:0;border-radius:1px}

.detail-panel{background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);overflow:hidden;display:none}.detail-panel.visible{display:block}
.detail-header{padding:20px;border-bottom:1px solid var(--blue-border);display:flex;align-items:center;gap:16px}
.dh-icon{width:48px;height:48px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.dh-info{flex:1}.dh-name{font-family:var(--font-display);font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.dh-desc{font-size:12px;color:var(--text-secondary);margin-top:3px}
.dh-stats{display:flex;gap:20px;margin-left:auto}.dhs{text-align:center}.dhs-v{font-family:var(--font-display);font-weight:700;font-size:18px;line-height:1}.dhs-l{font-size:9px;color:var(--text-tertiary);margin-top:2px}
.status-label{font-family:var(--font-mono);font-size:9px;font-weight:500;padding:2px 8px;border-radius:3px;display:inline-flex;align-items:center;gap:4px}
.status-label.active{background:var(--positive-muted);color:var(--positive)}.status-label.active::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--positive);animation:pc 2s ease-in-out infinite}
.status-label.idle{background:var(--blue-glow);color:var(--blue-primary)}
.status-label.degraded{background:rgba(255,182,39,.1);color:var(--threat-medium)}.status-label.error{background:var(--negative-muted);color:var(--negative)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr}
.detail-left{border-right:1px solid var(--blue-border)}
.dp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--blue-border)}
.dp-title{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);display:flex;align-items:center;gap:7px}
.dp-title::before{content:'';width:3px;height:11px;background:var(--blue-primary);border-radius:2px}
.dp-badge{font-family:var(--font-mono);font-size:9px;padding:2px 7px;border-radius:3px;background:var(--blue-glow);color:var(--blue-primary);border:1px solid var(--blue-border)}
.output-feed{max-height:360px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-elevated) transparent}.output-feed::-webkit-scrollbar{width:3px}.output-feed::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:2px}
.output-item{padding:12px 20px;border-bottom:1px solid rgba(0,212,255,.05);transition:background .1s;cursor:pointer}.output-item:hover{background:var(--bg-hover)}.output-item:last-child{border-bottom:none}
.output-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.output-type{font-family:var(--font-mono);font-size:8px;font-weight:500;padding:2px 7px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase}
.output-type.insight{background:var(--purple-dim);color:var(--purple)}.output-type.classification{background:var(--blue-glow);color:var(--blue-primary)}.output-type.correlation{background:var(--negative-muted);color:var(--negative)}.output-type.score{background:rgba(255,182,39,.1);color:var(--threat-medium)}.output-type.trend_report{background:var(--positive-muted);color:var(--positive)}
.output-sev{font-family:var(--font-mono);font-size:8px;font-weight:500;padding:2px 6px;border-radius:3px}
.output-sev.critical{background:var(--negative-muted);color:var(--negative)}.output-sev.high{background:rgba(255,107,53,.12);color:var(--threat-high)}.output-sev.medium{background:rgba(255,182,39,.12);color:var(--threat-medium)}.output-sev.info{background:var(--blue-glow);color:var(--blue-primary)}
.output-time{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-left:auto}
.output-text{font-size:12px;line-height:1.5;color:var(--text-secondary)}.output-text strong{color:var(--text-primary);font-weight:500}
.output-entities{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.output-entity{font-family:var(--font-mono);font-size:8px;padding:2px 6px;border-radius:3px;background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--blue-border)}
.health-chart{padding:20px;height:360px}
</style>
</head>

function relTime(m){return m<1?'Just now':m<60?m+'m ago':m<1440?Math.floor(m/60)+'h ago':Math.floor(m/1440)+'d ago'}
function actColor(v,max){const i=max>0?v/max:0;return i===0?'var(--bg-elevated)':i<.3?'rgba(0,212,255,.15)':i<.6?'rgba(0,212,255,.35)':i<.8?'rgba(0,212,255,.55)':'rgba(0,212,255,.8)'}

function renderAgg(){
  const j=AGENTS.reduce((a,g)=>a+g.jobs_24h,0),o=AGENTS.reduce((a,g)=>a+g.outputs_24h,0),e=AGENTS.reduce((a,g)=>a+g.errors_24h,0),ac=AGENTS.filter(a=>a.status==='active').length;
  document.getElementById('agg-stats').innerHTML=`
    <div class="ac"><div class="ac-v" style="color:var(--positive)">${ac}/${AGENTS.length}</div><div class="ac-l">Agents operational</div><div class="ac-s">${AGENTS.filter(a=>a.status==='idle').length} idle</div></div>
    <div class="ac"><div class="ac-v" style="color:var(--blue-primary)">${j}</div><div class="ac-l">Jobs (24h)</div><div class="ac-s">All agents</div></div>
    <div class="ac"><div class="ac-v" style="color:var(--text-accent)">${o}</div><div class="ac-l">Outputs (24h)</div><div class="ac-s">Insights + classifications</div></div>
    <div class="ac"><div class="ac-v" style="color:${e>0?'var(--negative)':'var(--positive)'}">${e}</div><div class="ac-l">Errors (24h)</div><div class="ac-s">${e===0?'All clear':'Attention needed'}</div></div>`;
}

function renderCards(){
  const g=document.getElementById('agent-grid');
  g.innerHTML=AGENTS.map(a=>{const mx=Math.max(...a.activity,1);return`<div class="agent-card" data-id="${a.id}"><div class="status-dot ${a.status}"></div><div class="agent-header"><div class="agent-icon ${a.iconClass}">${a.icon}</div><div class="agent-name-block"><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div></div><div class="agent-stats"><div class="as"><div class="as-v" style="color:var(--blue-primary)">${a.jobs_24h}</div><div class="as-l">Jobs</div></div><div class="as"><div class="as-v">${a.outputs_24h}</div><div class="as-l">Outputs</div></div><div class="as"><div class="as-v" style="color:${a.errors_24h>0?'var(--negative)':'var(--positive)'}">${a.errors_24h}</div><div class="as-l">Errors</div></div></div><div class="agent-last"><span>Last: ${relTime(a.last_output)}</span><span>Next: ~${relTime(a.next_run).replace(' ago','')}</span></div><div class="activity-bar">${a.activity.map(v=>`<div class="activity-seg" style="background:${actColor(v,mx)}"></div>`).join('')}</div></div>`}).join('');
  g.querySelectorAll('.agent-card').forEach(c=>c.addEventListener('click',()=>{g.querySelectorAll('.agent-card').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');showDetail(c.dataset.id)}));
}

let hChart=null;
function showDetail(id){
  const a=AGENTS.find(x=>x.id===id);if(!a)return;
  const p=document.getElementById('detail-panel');p.classList.add('visible');
  p.innerHTML=`<div class="detail-header"><div class="dh-icon ${a.iconClass}">${a.icon}</div><div class="dh-info"><div class="dh-name">${a.name}<span class="status-label ${a.status}">${a.status.charAt(0).toUpperCase()+a.status.slice(1)}</span></div><div class="dh-desc">${a.desc}</div></div><div class="dh-stats"><div class="dhs"><div class="dhs-v">${a.schedule}</div><div class="dhs-l">Schedule</div></div><div class="dhs"><div class="dhs-v">${a.avg_ms>1000?(a.avg_ms/1000).toFixed(1)+'s':a.avg_ms+'ms'}</div><div class="dhs-l">Avg duration</div></div><div class="dhs"><div class="dhs-v" style="color:${a.errors_24h>0?'var(--negative)':'var(--positive)'}">${((1-a.errors_24h/Math.max(a.jobs_24h,1))*100).toFixed(1)}%</div><div class="dhs-l">Success</div></div></div></div>
  <div class="detail-grid"><div class="detail-left"><div class="dp-head"><div class="dp-title">Recent Outputs</div><div class="dp-badge">${a.outputs_24h} today</div></div><div class="output-feed">${a.outputs.map(o=>`<div class="output-item"><div class="output-meta"><span class="output-type ${o.type}">${o.type.replace('_',' ')}</span>${o.sev?`<span class="output-sev ${o.sev}">${o.sev}</span>`:''}<span class="output-time">${o.time}</span></div><div class="output-text">${o.text}</div>${o.entities.length?`<div class="output-entities">${o.entities.map(e=>`<span class="output-entity">${e}</span>`).join('')}</div>`:''}</div>`).join('')}</div></div>
  <div><div class="dp-head"><div class="dp-title">Health (24h)</div><div class="dp-badge">${a.jobs_24h} runs</div></div><div class="health-chart"><canvas id="hc"></canvas></div></div></div>`;

  if(hChart){hChart.destroy();hChart=null}
  setTimeout(()=>{const ctx=document.getElementById('hc');if(!ctx)return;
    const hrs=Array.from({length:24},(_,i)=>{const h=(new Date().getHours()-23+i+24)%24;return String(h).padStart(2,'0')+':00'});
    hChart=new Chart(ctx,{type:'bar',data:{labels:hrs,datasets:[
      {label:'Duration (s)',data:a.health.runs.map(v=>v/1000),backgroundColor:'rgba(0,212,255,0.25)',borderColor:'rgba(0,212,255,0.6)',borderWidth:1,borderRadius:3,barPercentage:.6,yAxisID:'y'},
      {label:'Outputs',data:a.health.outputs,type:'line',borderColor:'#00e5a0',backgroundColor:'transparent',borderWidth:2,tension:.35,pointRadius:0,pointHoverRadius:4,yAxisID:'y1'},
      {label:'Errors',data:a.health.errors,type:'line',borderColor:'#ff3b5c',backgroundColor:'transparent',borderWidth:2,tension:.35,pointRadius:a.health.errors.map(v=>v>0?5:0),pointBackgroundColor:'#ff3b5c',yAxisID:'y1'}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{display:true,position:'top',labels:{color:'#7a8ba8',font:{family:"'IBM Plex Mono'",size:9},boxWidth:12,padding:12,usePointStyle:true}},tooltip:{backgroundColor:'rgba(10,16,32,0.95)',borderColor:'rgba(0,212,255,0.35)',borderWidth:1,titleFont:{family:"'Chakra Petch'",size:11},bodyFont:{family:"'IBM Plex Mono'",size:11},titleColor:'#e8edf5',bodyColor:'#7a8ba8',padding:10,cornerRadius:6}},scales:{x:{ticks:{color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:8},maxRotation:0,autoSkip:true,maxTicksLimit:12},grid:{color:'rgba(0,212,255,0.04)',drawBorder:false}},y:{position:'left',title:{display:true,text:'Duration (s)',color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:9}},ticks:{color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:9}},grid:{color:'rgba(0,212,255,0.04)',drawBorder:false},beginAtZero:true},y1:{position:'right',title:{display:true,text:'Count',color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:9}},ticks:{color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:9}},grid:{display:false},beginAtZero:true}}}});
  },50);
  p.scrollIntoView({behavior:'smooth',block:'start'});
}

renderAgg();renderCards();
setTimeout(()=>document.querySelector('.agent-card').click(),100);
</script>
</body>
</html>
