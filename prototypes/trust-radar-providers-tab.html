<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Radar — Providers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet-src.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg-void:#040810;--bg-surface:#0a1020;--bg-panel:#0d1528;--bg-elevated:#111d35;--bg-hover:#152545;--blue-primary:#00d4ff;--blue-muted:#0091b3;--blue-glow:rgba(0,212,255,.08);--blue-border:rgba(0,212,255,.15);--blue-border-bright:rgba(0,212,255,.35);--threat-critical:#ff3b5c;--threat-high:#ff6b35;--threat-medium:#ffb627;--threat-low:#00d4ff;--positive:#00e5a0;--positive-muted:rgba(0,229,160,.12);--negative:#ff3b5c;--negative-muted:rgba(255,59,92,.12);--text-primary:#e8edf5;--text-secondary:#7a8ba8;--text-tertiary:#4a5a73;--text-accent:#00d4ff;--font-display:'Chakra Petch',sans-serif;--font-body:'Outfit',sans-serif;--font-mono:'IBM Plex Mono',monospace;--radius:6px;--radius-lg:10px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bg-surface);border-bottom:1px solid var(--blue-border);z-index:100}
.topbar-left{display:flex;align-items:center;gap:20px}
.logo{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--text-primary);display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-icon{width:28px;height:28px;border-radius:50%;border:2px solid var(--blue-primary);display:flex;align-items:center;justify-content:center}
.logo-icon::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--blue-primary);animation:pc 2s ease-in-out infinite}
@keyframes pc{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.5)}}
.logo span{color:var(--blue-primary)}
.nav-pills{display:flex;gap:2px;background:var(--bg-panel);padding:3px;border-radius:var(--radius)}
.np{font-family:var(--font-body);font-size:11px;font-weight:500;padding:5px 13px;border-radius:4px;border:none;background:0 0;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.np.active{background:var(--bg-elevated);color:var(--text-accent)}.np:hover:not(.active){color:var(--text-primary)}
.topbar-right{display:flex;align-items:center;gap:14px}
.feed-st{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;color:var(--positive)}
.fd{width:5px;height:5px;border-radius:50%;background:var(--positive);animation:pc 2s ease-in-out infinite}
.live-tag{font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--blue-primary);padding:3px 9px;border:1px solid var(--blue-border-bright);border-radius:3px}
.ua{width:30px;height:30px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--blue-primary);cursor:pointer}

.main{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-elevated) transparent}
.main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:3px}
#hub-view,#detail-view{display:none}
#hub-view.visible,#detail-view.visible{display:block}

/* AGGREGATE STATS */
.agg{display:flex;gap:12px;padding:0 24px 16px}
.ac{flex:1;background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);padding:14px 16px}
.ac-v{font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1}
.ac-l{font-size:10px;color:var(--text-tertiary);margin-top:4px}.ac-s{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:2px}

/* SUBTABS */
.sub-tabs{display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--blue-border)}
.stab{font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);padding:12px 20px 10px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.stab:hover{color:var(--text-secondary)}.stab.active{color:var(--text-accent);border-bottom-color:var(--blue-primary)}
.tc{font-family:var(--font-mono);font-size:9px;background:var(--bg-elevated);color:var(--text-secondary);padding:1px 6px;border-radius:3px;margin-left:6px}
.stab.active .tc{background:var(--blue-glow);color:var(--blue-primary)}
.sact{margin-left:auto;display:flex;gap:8px;align-items:center;padding-bottom:4px}
.pp{font-family:var(--font-mono);font-size:9px;padding:4px 10px;border-radius:4px;border:1px solid var(--blue-border);background:0 0;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.pp.active{background:var(--bg-elevated);color:var(--text-accent);border-color:var(--blue-border-bright)}.pp:hover:not(.active){color:var(--text-primary)}
.tab-c{display:none;padding:20px 24px}.tab-c.visible{display:block}

/* PROVIDER CARDS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.pcard{background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .2s;position:relative}
.pcard:hover{border-color:var(--blue-border-bright);background:var(--bg-panel);transform:translateY(-1px)}
.pcard.improving-card{border-color:rgba(0,229,160,.15)}.pcard.improving-card:hover{border-color:rgba(0,229,160,.35)}

.pcard-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.prank{font-family:var(--font-display);font-weight:700;font-size:14px;width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg-elevated);color:var(--text-tertiary);border:1px solid var(--blue-border)}
.prank.top{background:var(--negative-muted);color:var(--negative);border-color:rgba(255,59,92,.25)}
.pico{width:40px;height:40px;border-radius:var(--radius);background:var(--bg-elevated);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;flex-direction:column}
.pico-asn{font-family:var(--font-mono);font-size:7px;color:var(--text-tertiary);letter-spacing:.3px}
.pico-flag{font-size:16px;line-height:1}
.pinf{flex:1;min-width:0}.pnam{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pasn{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:1px;display:flex;align-items:center;gap:6px}
.country-code{font-size:9px;padding:1px 5px;background:var(--bg-elevated);border-radius:3px;color:var(--text-secondary)}

.pcard-stats{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.pt-v{font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1}
.pt-l{font-size:9px;color:var(--text-tertiary);margin-top:2px}
.ptrend{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.tpct{font-family:var(--font-mono);font-size:12px;font-weight:500}.tpct.up{color:var(--negative)}.tpct.down{color:var(--positive)}

.pcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,212,255,.06)}
.rep-gauge{display:flex;align-items:center;gap:6px}
.rep-bar{width:60px;height:5px;background:var(--bg-elevated);border-radius:3px;overflow:hidden}
.rep-fill{height:100%;border-radius:3px}
.rep-val{font-family:var(--font-mono);font-size:10px}
.resp-time{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.top-brand{font-size:10px;color:var(--text-secondary)}

/* DETAIL VIEW */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-size:12px;color:var(--text-secondary);cursor:pointer;padding:4px 0;margin-bottom:16px;border:none;background:none;transition:color .15s}
.back-btn:hover{color:var(--text-accent)}

.prov-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--blue-border)}
.ph-icon{width:56px;height:56px;border-radius:var(--radius-lg);background:var(--bg-elevated);border:1px solid var(--blue-border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:2px}
.ph-icon .flag{font-size:22px}.ph-icon .asn-sm{font-family:var(--font-mono);font-size:8px;color:var(--text-tertiary)}
.ph-meta{flex:1}
.ph-title{font-family:var(--font-display);font-size:24px;font-weight:700;display:flex;align-items:center;gap:12px}
.asn-pill{font-family:var(--font-mono);font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--blue-border)}
.ph-sub{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);margin-top:4px}
.ph-stats{display:flex;gap:24px;margin-top:12px}
.hs{display:flex;flex-direction:column}.hs-v{font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1}.hs-l{font-size:10px;color:var(--text-tertiary);margin-top:3px}

/* Reputation ring */
.rep-ring{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.rep-ring-val{font-family:var(--font-display);font-weight:700;font-size:22px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.rep-ring-label{font-family:var(--font-display);font-size:10px;font-weight:600;margin-top:4px;letter-spacing:1px;text-transform:uppercase}

.cgrid{display:grid;grid-template-columns:1fr 360px;gap:20px;margin-bottom:24px}
.panel{background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);overflow:hidden}
.phead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--blue-border)}
.ptitle{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);display:flex;align-items:center;gap:7px}
.ptitle::before{content:'';width:3px;height:11px;background:var(--blue-primary);border-radius:2px}
.pbadge{font-family:var(--font-mono);font-size:9px;padding:2px 7px;border-radius:3px;background:var(--blue-glow);color:var(--blue-primary);border:1px solid var(--blue-border)}
.padded{padding:16px 18px}

/* Threats table (reused from Brands) */
.tcontrols{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid rgba(0,212,255,.08)}
.tfilter{display:flex;gap:6px}
.fp{font-family:var(--font-body);font-size:10px;font-weight:500;padding:4px 10px;border-radius:4px;border:1px solid var(--blue-border);background:0 0;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.fp.active{background:var(--bg-elevated);color:var(--text-accent);border-color:var(--blue-border-bright)}.fp:hover:not(.active){color:var(--text-primary)}
table{width:100%;border-collapse:collapse}
thead th{font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);text-align:left;padding:10px 18px;border-bottom:1px solid var(--blue-border);cursor:pointer;white-space:nowrap}
thead th:hover{color:var(--text-secondary)}
tbody tr{border-bottom:1px solid rgba(0,212,255,.05);transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--bg-hover)}
td{padding:10px 18px;font-size:12px;vertical-align:middle}
.td-url{font-family:var(--font-mono);font-size:11px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpill{font-family:var(--font-mono);font-size:8px;font-weight:500;padding:2px 7px;border-radius:3px;letter-spacing:.3px}
.tpill.phishing{background:var(--negative-muted);color:var(--negative)}.tpill.typosquat{background:rgba(255,182,39,.12);color:var(--threat-medium)}.tpill.impersonation{background:rgba(255,107,53,.12);color:var(--threat-high)}.tpill.credential{background:rgba(138,43,226,.12);color:#b388ff}
.stbadge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:9px;font-weight:500;padding:2px 8px;border-radius:3px}
.stbadge.active{background:var(--negative-muted);color:var(--negative)}.stbadge.active::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--negative);animation:pc 2s ease-in-out infinite}
.stbadge.down{background:var(--positive-muted);color:var(--positive)}.stbadge.monitoring{background:var(--blue-glow);color:var(--blue-primary)}
.ev-ico{width:24px;height:24px;border-radius:4px;background:var(--bg-elevated);border:1px solid var(--blue-border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-secondary)}.ev-ico.cap{color:var(--positive);border-color:rgba(0,229,160,.3)}
.pgn{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--blue-border)}
.pgn-i{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.pgn-btns{display:flex;gap:4px}
.pgn-b{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--blue-border);background:0 0;color:var(--text-secondary);cursor:pointer}.pgn-b.act{background:var(--bg-elevated);color:var(--text-accent)}.pgn-b.dis{opacity:.3;cursor:default}

.rcol{display:flex;flex-direction:column;gap:16px}
#prov-map{height:200px}
.leaflet-container{background:var(--bg-void)!important}.leaflet-control-zoom{display:none}
.leaflet-popup-content-wrapper{background:rgba(10,16,32,.95)!important;border:1px solid var(--blue-border-bright)!important;border-radius:var(--radius-lg)!important;color:var(--text-primary)!important;font-family:var(--font-body)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:11px!important}.leaflet-popup-tip{background:rgba(10,16,32,.95)!important}

.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.bar-lbl{font-size:11px;color:var(--text-secondary);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-trk{flex:1;height:6px;background:var(--bg-elevated);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bar-ct{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);width:36px;text-align:right;flex-shrink:0}

/* AI insight card */
.ai-card{padding:12px;border-radius:var(--radius);border:1px solid rgba(138,43,226,.2);background:rgba(138,43,226,.04);margin-bottom:8px}
.ai-agent{font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#b388ff;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ai-agent::before{content:'';width:4px;height:4px;border-radius:50%;background:#b388ff}
.ai-text{font-size:11px;line-height:1.5;color:var(--text-secondary)}.ai-text strong{color:var(--text-primary);font-weight:500}

.tl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tl-title{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);display:flex;align-items:center;gap:7px}
.tl-title::before{content:'';width:3px;height:11px;background:var(--blue-primary);border-radius:2px}
.chart-wrap{position:relative;height:240px;background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);padding:16px}
.chart-legend{display:flex;gap:16px;margin-bottom:8px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px;color:var(--text-secondary)}
.legend-swatch{width:24px;height:3px;border-radius:2px}

.empty-state{text-align:center;padding:32px;color:var(--text-tertiary);font-size:13px}

/* All providers table container */
.atbl{background:var(--bg-surface);border:1px solid var(--blue-border);border-radius:var(--radius-lg);overflow:hidden}
.search-in{font-family:var(--font-body);font-size:12px;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--blue-border);background:var(--bg-panel);color:var(--text-primary);outline:none}
.search-in:focus{border-color:var(--blue-border-bright)}.search-in::placeholder{color:var(--text-tertiary)}
.sel{font-family:var(--font-body);font-size:11px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--blue-border);background:var(--bg-panel);color:var(--text-primary);cursor:pointer;outline:none}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo"><div class="logo-icon"></div>TRUST <span>RADAR</span></div>
      <nav class="nav-pills">
        <button class="np">Observatory</button>
        <button class="np">Brands</button>
        <button class="np active">Providers</button>
        <button class="np">Campaigns</button>
        <button class="np">Trends</button>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="feed-st"><span class="fd"></span>6 feeds active</div>
      <span class="live-tag">Live</span>
      <div class="ua">SA</div>
    </div>
  </header>

  <main class="main">
    <!-- HUB -->
    <div id="hub-view" class="visible">
      <div style="padding:20px 24px 0"><div style="font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:16px">Infrastructure Intelligence</div></div>
      <div class="agg" id="agg-stats"></div>
      <div class="sub-tabs">
        <div class="stab active" data-tab="worst">Worst Actors<span class="tc" id="tc-worst"></span></div>
        <div class="stab" data-tab="improving">Improving<span class="tc" id="tc-imp"></span></div>
        <div class="stab" data-tab="all">All Providers<span class="tc" id="tc-all"></span></div>
        <div class="sact">
          <button class="pp active" data-p="7d">7d</button>
          <button class="pp" data-p="30d">30d</button>
          <button class="pp" data-p="90d">90d</button>
        </div>
      </div>
      <div class="tab-c visible" id="tab-worst"></div>
      <div class="tab-c" id="tab-improving"></div>
      <div class="tab-c" id="tab-all"></div>
    </div>

    <!-- DETAIL -->
    <div id="detail-view" style="padding:20px 24px">
      <button class="back-btn" id="backBtn">← Back to Providers</button>
      <div id="detail-header"></div>
      <div class="cgrid">
        <div class="panel" id="detail-threats"></div>
        <div class="rcol">
          <div class="panel"><div class="phead"><div class="ptitle">Target Locations</div><div class="pbadge" id="loc-ct">—</div></div><div id="prov-map" style="height:200px"></div></div>
          <div class="panel"><div class="phead"><div class="ptitle">Brands Targeted</div></div><div class="padded" id="brand-bars"></div></div>
          <div class="panel"><div class="phead"><div class="ptitle">AI Assessment</div></div><div class="padded" id="ai-insight"></div></div>
        </div>
      </div>
      <div>
        <div class="tl-head"><div class="tl-title">Threat Trend</div></div>
        <div class="chart-legend" id="chart-legend"></div>
        <div class="chart-wrap"><canvas id="tl-chart"></canvas></div>
      </div>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// SIMULATED API DATA — all dynamic, no hardcoded provider references in rendering
// ═══════════════════════════════════════════════════════════

const COUNTRIES = {US:'🇺🇸',DE:'🇩🇪',FR:'🇫🇷',NL:'🇳🇱',FI:'🇫🇮',RO:'🇷🇴',RU:'🇷🇺',SG:'🇸🇬',CA:'🇨🇦',GB:'🇬🇧',UA:'🇺🇦',HK:'🇭🇰',LT:'🇱🇹',JP:'🇯🇵'};

const PROVIDERS = [
  {id:'p1',name:'Namecheap Hosting',asn:'AS22612',country:'US',threats:847,trend_7d:23,trend_30d:38,reputation:22,response_hrs:48,top_brand:'PayPal',spark:[28,32,38,44,52,60,72]},
  {id:'p2',name:'DigitalOcean',asn:'AS14061',country:'US',threats:612,trend_7d:18,trend_30d:25,reputation:35,response_hrs:24,top_brand:'Amazon',spark:[24,28,30,34,40,46,52]},
  {id:'p3',name:'OVH SAS',asn:'AS16276',country:'FR',threats:534,trend_7d:41,trend_30d:52,reputation:28,response_hrs:4.2,top_brand:'Microsoft',spark:[14,18,22,30,38,48,62]},

// ═══════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════

function getProvider(id) { return ALL.find(p=>p.id===id); }
function tColor(t) { return t>=500?'var(--threat-critical)':t>=200?'var(--threat-high)':t>=100?'var(--threat-medium)':'var(--blue-primary)'; }
function repColor(r) { return r>=75?'var(--positive)':r>=50?'var(--blue-primary)':r>=30?'var(--threat-medium)':r>=15?'var(--threat-high)':'var(--threat-critical)'; }

function sparkSVG(data,color) {
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${2+i/(data.length-1)*76},${26-((v-min)/range)*24}`);
  const last=pts[pts.length-1].split(',');
  return `<svg width="80" height="28" viewBox="0 0 80 28"><polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${color}"/></svg>`;
}

function genTimelines(days) {
  const make = ()=>{let v=5+Math.random()*20;return Array.from({length:days},()=>{v=Math.max(1,v+Math.floor(Math.random()*10-4));return v})};
  const labels=Array.from({length:days},(_,i)=>{const d=new Date(Date.now()-(days-1-i)*86400000);return`${d.getMonth()+1}/${d.getDate()}`});
  return {labels,d7:make().slice(-7),d30:make(),d90:make()};
}

function genBrands(provName) {
  const brands=['PayPal','Amazon','Microsoft','Coinbase','Apple','Chase Bank','Binance','Netflix','Wells Fargo','MetaMask'];
  const n=3+Math.floor(Math.random()*4);
  const total=50+Math.floor(Math.random()*200);
  const result=[];let rem=total;
  for(let i=0;i<n;i++){const ct=i<n-1?Math.floor(rem*(0.2+Math.random()*0.4)):rem;result.push({name:brands[(brands.indexOf(provName)+i)%brands.length]||brands[i],count:ct,pct:Math.round(ct/total*1000)/10});rem-=ct}
  const colors=['#ff3b5c','#ff6b35','#ffb627','#00d4ff','#0091b3','#4a5a73'];
  return result.sort((a,b)=>b.count-a.count).map((b,i)=>({...b,color:colors[i]||colors[5]}));
}

function genThreats(count) {
  const types=['phishing','typosquat','impersonation','credential'];
  const brands=['PayPal','Amazon','Microsoft','Coinbase','Apple','Chase Bank','Netflix','Binance'];
  const statuses=['active','active','active','down','monitoring'];
  const tlds=['.xyz','.top','.shop','.net','.com'];
  return Array.from({length:Math.min(count,15)},(_,i)=>{
    const brand=brands[Math.floor(Math.random()*brands.length)];
    const base=brand.toLowerCase().replace(/\s+/g,'');
    const d=new Date(Date.now()-i*3600000*(2+Math.random()*6));
    return{
      url:base+['-secure','-login','-verify','-update'][i%4]+tlds[i%5]+'/auth',
      type:types[Math.floor(Math.random()*types.length)],
      brand, first_seen:d.toISOString(),
      status:statuses[Math.floor(Math.random()*statuses.length)],
      evidence:Math.random()>.2
    };
  });
}

function genLocations() {
  const locs=[{lat:37.09,lng:-95.71,country:'US'},{lat:51.17,lng:10.45,country:'DE'},{lat:55.38,lng:-3.44,country:'UK'},{lat:52.13,lng:5.29,country:'NL'},{lat:35.86,lng:104.2,country:'CN'},{lat:-14.24,lng:-51.93,country:'BR'}];
  return locs.slice(0,3+Math.floor(Math.random()*3)).map((l,i)=>({...l,count:Math.max(5,Math.floor(80*(1-i*.2)*(0.5+Math.random()*0.5)))}));
}

function renderAgg() {
  const worst=PROVIDERS[0];const best=IMPROVING.reduce((a,b)=>b.trend_7d<a.trend_7d?b:a);
  document.getElementById('agg-stats').innerHTML=`
    <div class="ac"><div class="ac-v" style="color:var(--blue-primary)">${ALL.length}</div><div class="ac-l">Providers tracked</div><div class="ac-s">Across all feeds</div></div>
    <div class="ac"><div class="ac-v" style="color:var(--threat-critical)">${worst.name}</div><div class="ac-l">Worst this week</div><div class="ac-s">${worst.threats} active threats</div></div>
    <div class="ac"><div class="ac-v" style="color:var(--positive)">${best.name}</div><div class="ac-l">Most improved</div><div class="ac-s">${best.trend_7d}% this week</div></div>
    <div class="ac"><div class="ac-v" style="color:var(--threat-medium)">18h</div><div class="ac-l">Avg response time</div><div class="ac-s">Across all providers</div></div>`;
}

function renderProvCard(p,i,isImproving) {
  const c=isImproving?'var(--positive)':tColor(p.threats);
  const rc=repColor(p.reputation);
  const tSign=p.trend_7d>=0?'+':'';
  const tClass=p.trend_7d>=0?'up':'down';
  const flag=COUNTRIES[p.country]||'🌐';
  return `<div class="pcard ${isImproving?'improving-card':''}" data-id="${p.id}">
    <div class="pcard-top">
      <div class="prank ${!isImproving&&i<3?'top':''}">${i+1}</div>
      <div class="pico"><span class="pico-flag">${flag}</span><span class="pico-asn">${p.asn}</span></div>
      <div class="pinf"><div class="pnam">${p.name}</div><div class="pasn">${p.asn} <span class="country-code">${p.country}</span></div></div>
    </div>
    <div class="pcard-stats">
      <div><div class="pt-v" style="color:${c}">${p.threats}</div><div class="pt-l">active threats</div></div>
      <div class="ptrend"><div class="tpct ${tClass}">${tSign}${p.trend_7d}%</div>${sparkSVG(p.spark,c)}</div>
    </div>
    <div class="pcard-footer">
      <div class="rep-gauge"><div class="rep-bar"><div class="rep-fill" style="width:${p.reputation}%;background:${rc}"></div></div><span class="rep-val" style="color:${rc}">${p.reputation}/100</span></div>
      <span class="resp-time">${p.response_hrs?p.response_hrs+'h resp':'No data'}</span>
    </div>
  </div>`;
}

function renderWorst() {
  document.getElementById('tab-worst').innerHTML='<div class="pgrid">'+PROVIDERS.map((p,i)=>renderProvCard(p,i,false)).join('')+'</div>';
  bindCards('tab-worst');
}

function renderImproving() {
  document.getElementById('tab-improving').innerHTML='<div class="pgrid">'+IMPROVING.map((p,i)=>renderProvCard(p,i,true)).join('')+'</div>';
  bindCards('tab-improving');

function renderAllProv() {
  const sorted=[...ALL].sort((a,b)=>b.threats-a.threats);
  let h=`<div style="display:flex;gap:12px;margin-bottom:16px"><input class="search-in" placeholder="Search providers..." style="width:280px"><select class="sel"><option value="">All Countries</option><option>US</option><option>DE</option><option>FR</option><option>NL</option><option>RU</option><option>LT</option></select></div>
  <div class="atbl"><table><thead><tr><th>Provider</th><th>ASN</th><th>Country</th><th>Threats</th><th>7d</th><th>30d</th><th>Reputation</th><th>Response</th></tr></thead><tbody>`;
  sorted.forEach(p=>{
    const c=tColor(p.threats);const rc=repColor(p.reputation);const flag=COUNTRIES[p.country]||'🌐';
    const t7=p.trend_7d>=0?'up':'down';const t30=p.trend_30d>=0?'up':'down';
    h+=`<tr data-id="${p.id}"><td style="font-weight:500">${flag} ${p.name}</td><td style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)">${p.asn}</td><td>${p.country}</td>
    <td><span style="font-family:var(--font-display);font-weight:700;font-size:14px;color:${c}">${p.threats}</span></td>
    <td><span class="tpct ${t7}" style="font-size:11px">${p.trend_7d>=0?'+':''}${p.trend_7d}%</span></td>
    <td><span class="tpct ${t30}" style="font-size:11px">${p.trend_30d>=0?'+':''}${p.trend_30d}%</span></td>
    <td><span style="font-family:var(--font-mono);font-size:11px;color:${rc}">${p.reputation}/100</span></td>
    <td style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)">${p.response_hrs?p.response_hrs+'h':'—'}</td></tr>`;
  });
  h+='</tbody></table></div>';
  document.getElementById('tab-all').innerHTML=h;
  document.querySelectorAll('#tab-all tbody tr').forEach(r=>r.addEventListener('click',()=>showDetail(r.dataset.id)));
}

function bindCards(tabId) {
  document.querySelectorAll('#'+tabId+' .pcard').forEach(c=>c.addEventListener('click',()=>showDetail(c.dataset.id)));
}

let miniMap=null,tlChart=null;

function showDetail(provId) {
  const p=getProvider(provId);if(!p)return;

  const timeline=genTimelines(90);
  const rc=repColor(p.reputation);
  const flag=COUNTRIES[p.country]||'🌐';

  document.getElementById('hub-view').classList.remove('visible');
  document.getElementById('detail-view').classList.add('visible');

  // Header
  document.getElementById('detail-header').innerHTML=`
    <div class="prov-header">
      <div class="ph-icon"><span class="flag">${flag}</span><span class="asn-sm">${p.asn}</span></div>
      <div class="ph-meta">
        <div class="ph-title">${p.name}<span class="asn-pill">${p.asn}</span><span class="country-code" style="font-size:11px;padding:3px 8px">${p.country}</span></div>

        <div class="ph-stats">
          <div class="hs"><div class="hs-v" style="color:${tColor(p.threats)}">${p.threats}</div><div class="hs-l">Active threats</div></div>
          <div class="hs"><div class="hs-v" style="color:${p.trend_7d>=0?'var(--threat-medium)':'var(--positive)'}">${p.trend_7d>=0?'+':''}${p.trend_7d}%</div><div class="hs-l">7-day trend</div></div>
          <div class="hs"><div class="hs-v" style="color:${p.trend_30d>=0?'var(--threat-high)':'var(--positive)'}">${p.trend_30d>=0?'+':''}${p.trend_30d}%</div><div class="hs-l">30-day trend</div></div>
          <div class="hs"><div class="hs-v" style="color:var(--text-secondary)">${p.response_hrs?p.response_hrs+'h':'N/A'}</div><div class="hs-l">Avg response</div></div>
        </div>
      </div>
      <div class="rep-ring"><div style="width:72px;height:72px;position:relative"><svg width="72" height="72" viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="none" stroke="var(--bg-elevated)" stroke-width="5"/><circle cx="36" cy="36" r="30" fill="none" stroke="${rc}" stroke-width="5" stroke-dasharray="188.5" stroke-dashoffset="${188.5*(1-p.reputation/100)}" stroke-linecap="round" transform="rotate(-90 36 36)"/></svg><div class="rep-ring-val" style="color:${rc}">${p.reputation}</div></div><div class="rep-ring-label" style="color:${rc}">${p.reputation>=60?'Responsive':p.reputation>=30?'Slow':'Negligent'}</div></div>
    </div>`;

  // Threats
  let th=`<div class="phead"><div class="ptitle">Threats Hosted</div><div class="pbadge">${p.threats} total</div></div>`;
  if(threats.length===0){th+='<div class="empty-state">No threats currently hosted</div>'}
  else{
    th+=`<div class="tcontrols"><div class="tfilter"><button class="fp active">All</button><button class="fp">Phishing</button><button class="fp">Typosquat</button><button class="fp">Impersonation</button></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)">1–${threats.length} of ${p.threats}</span></div>
    <table><thead><tr><th>Malicious URL</th><th>Type</th><th>Target Brand</th><th>First Seen</th><th>Status</th><th>Ev</th></tr></thead><tbody>`;
    threats.forEach(t=>{
      const d=new Date(t.first_seen);
      th+=`<tr><td><div class="td-url">${t.url}</div></td><td><span class="tpill ${t.type}">${t.type}</span></td><td style="font-size:11px;color:var(--text-secondary)">${t.brand}</td><td><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)">${d.toISOString().substring(0,16).replace('T',' ')}</span></td><td><span class="stbadge ${t.status}">${t.status}</span></td><td><span class="ev-ico ${t.evidence?'cap':''}">${t.evidence?'◉':'○'}</span></td></tr>`;
    });
    th+=`</tbody></table><div class="pgn"><span class="pgn-i">Page 1 of ${Math.ceil(p.threats/15)}</span><div class="pgn-btns"><button class="pgn-b dis">‹</button><button class="pgn-b act">1</button><button class="pgn-b">2</button><button class="pgn-b">›</button></div></div>`;
  }
  document.getElementById('detail-threats').innerHTML=th;
  document.querySelectorAll('#detail-threats .fp').forEach(f=>f.addEventListener('click',()=>{f.parentElement.querySelectorAll('.fp').forEach(x=>x.classList.remove('active'));f.classList.add('active')}));

  // Map
  document.getElementById('loc-ct').textContent=locations.length+' countries';
  if(miniMap){miniMap.remove();miniMap=null}
  setTimeout(()=>{
    miniMap=L.map('prov-map',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18,subdomains:'abcd'}).addTo(miniMap);
    const maxC=Math.max(...locations.map(l=>l.count));
    locations.forEach(l=>{
      const int=l.count/maxC;const col=int>=.7?'#ff3b5c':int>=.4?'#ff6b35':int>=.2?'#ffb627':'#00d4ff';
      L.circleMarker([l.lat,l.lng],{radius:Math.max(4,int*16),fillColor:col,fillOpacity:.3,color:col,weight:.5}).addTo(miniMap);
      L.circleMarker([l.lat,l.lng],{radius:Math.max(2,int*6),fillColor:col,fillOpacity:.9,color:col,weight:0}).bindPopup(`<div style="font-family:var(--font-display);font-weight:600;color:var(--text-accent);font-size:12px;margin-bottom:4px">${l.country}</div><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text-secondary)">Threats</span><span style="font-family:var(--font-mono);color:${col}">${l.count}</span></div>`).addTo(miniMap);

  const bb=document.getElementById('brand-bars');

  // AI insight
  document.getElementById('ai-insight').innerHTML=`<div class="ai-card">

  const d30=timeline.d30;

  const old30=timeline.d90.slice(0,30);
  const labels30=timeline.labels.slice(-30);

  tlChart=new Chart(ctx,{
    type:'line',
    data:{labels:labels30,datasets:[
      {label:'Last 30d',data:d30,borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,0.06)',fill:true,tension:.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#00d4ff',pointHoverBorderColor:'#fff',pointHoverBorderWidth:2,borderWidth:2},
      {label:'Prev 30d',data:prev30,borderColor:'#ff6b35',backgroundColor:'transparent',fill:false,tension:.35,pointRadius:0,borderWidth:1.5,borderDash:[4,3]},
      {label:'60-90d ago',data:old30,borderColor:'rgba(122,139,168,0.3)',backgroundColor:'transparent',fill:false,tension:.35,pointRadius:0,borderWidth:1,borderDash:[2,4]}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,16,32,0.95)',borderColor:'rgba(0,212,255,0.35)',borderWidth:1,titleFont:{family:"'Chakra Petch'",size:11,weight:'600'},bodyFont:{family:"'IBM Plex Mono'",size:11},titleColor:'#e8edf5',bodyColor:'#7a8ba8',padding:10,cornerRadius:6}},scales:{x:{ticks:{color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:9},maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{color:'rgba(0,212,255,0.04)',drawBorder:false}},y:{ticks:{color:'#4a5a73',font:{family:"'IBM Plex Mono'",size:9},padding:8},grid:{color:'rgba(0,212,255,0.04)',drawBorder:false},beginAtZero:true}}}
  });

  document.querySelector('.main').scrollTop=0;
}

function hideDetail() {
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('hub-view').classList.add('visible');
