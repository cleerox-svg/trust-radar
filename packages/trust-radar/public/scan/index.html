<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free brand exposure scan — see how attackers see your domain in 30 seconds.">
  <title>Scan your domain — Averrow</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg-page:        #060A14;
      --bg-card:        rgba(22,30,48,0.85);
      --bg-card-deep:   rgba(12,18,32,0.95);
      --bg-elevated:    rgba(18,26,44,0.92);
      --bg-input:       rgba(15,22,38,0.80);
      --amber:          #E5A832;
      --amber-dim:      #B8821F;
      --text-primary:   rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.60);
      --text-tertiary:  rgba(255,255,255,0.40);
      --text-muted:     rgba(255,255,255,0.25);
      --border-base:    rgba(255,255,255,0.08);
      --border-strong:  rgba(255,255,255,0.14);
      --sev-critical:   #f87171;
      --sev-high:       #fb923c;
      --sev-medium:     #fbbf24;
      --sev-low:        #60a5fa;
      --green:          #3CB878;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 20px; }
    .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 48px; }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
    .brand-tag {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--amber); font-family: ui-monospace, SFMono-Regular, monospace;
      padding-left: 12px; border-left: 1px solid var(--border-strong);
    }
    h1 { font-size: 36px; font-weight: 800; margin: 0 0 12px 0; line-height: 1.1; }
    h1 .accent { color: var(--amber); }
    .lede { color: var(--text-secondary); font-size: 16px; margin: 0 0 32px 0; max-width: 560px; line-height: 1.5; }
    .form {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .form input[type="text"] {
      flex: 1; min-width: 220px; padding: 14px 16px;
      background: var(--bg-input); border: 1px solid var(--border-strong);
      border-radius: 8px; color: var(--text-primary);
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 15px;
    }
    .form input[type="text"]::placeholder { color: var(--text-muted); }
    .form input[type="text"]:focus { outline: 2px solid var(--amber); outline-offset: 1px; border-color: var(--amber); }
    .btn {
      padding: 14px 22px; background: var(--amber); color: #0a0a0a;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 120ms ease;
    }
    .btn:hover { background: var(--amber-dim); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; color: var(--text-primary);
      border: 1px solid var(--border-strong);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.04); }
    .hint { font-size: 12px; color: var(--text-tertiary); font-family: ui-monospace, SFMono-Regular, monospace; }
    .error {
      margin-top: 16px; padding: 12px 16px;
      border: 1px solid rgba(248,113,113,0.30);
      background: rgba(248,113,113,0.06);
      color: var(--sev-critical); border-radius: 8px; font-size: 14px;
    }
    .loading {
      margin-top: 16px; color: var(--text-tertiary);
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 13px;
    }
    .result {
      margin-top: 32px; padding: 24px;
      background: var(--bg-card); border: 1px solid var(--border-strong);
      border-radius: 14px;
    }
    .result-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .result-head .domain { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
    .score {
      text-align: right; flex-shrink: 0;
      padding-left: 24px; border-left: 1px solid var(--border-strong);
    }
    .score-value { font-size: 44px; font-weight: 900; line-height: 1; font-family: ui-monospace, SFMono-Regular, monospace; }
    .score-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-tertiary); margin-top: 4px; font-family: ui-monospace, SFMono-Regular, monospace; }
    .pill {
      display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      font-family: ui-monospace, SFMono-Regular, monospace; font-weight: 600;
    }
    .pill-low      { color: var(--green);        background: rgba(60,184,120,0.10);  border: 1px solid rgba(60,184,120,0.25); }
    .pill-medium   { color: var(--sev-medium);   background: rgba(251,191,36,0.10);  border: 1px solid rgba(251,191,36,0.25); }
    .pill-high     { color: var(--sev-high);     background: rgba(251,146,60,0.10);  border: 1px solid rgba(251,146,60,0.25); }
    .pill-critical { color: var(--sev-critical); background: rgba(248,113,113,0.10); border: 1px solid rgba(248,113,113,0.25); }
    .findings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .finding {
      padding: 16px; border-radius: 10px;
      background: rgba(15,22,38,0.55); border: 1px solid var(--border-base);
    }
    .finding-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-tertiary); font-family: ui-monospace, SFMono-Regular, monospace; margin-bottom: 6px; }
    .finding-value { font-size: 18px; font-weight: 700; }
    .finding-detail { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .next-step {
      margin-top: 32px; padding: 24px;
      background: linear-gradient(160deg, rgba(229,168,50,0.06) 0%, rgba(229,168,50,0.02) 100%);
      border: 1px solid rgba(229,168,50,0.20); border-radius: 14px;
    }
    .next-step h2 { margin: 0 0 8px 0; font-size: 20px; font-weight: 700; }
    .next-step p { margin: 0 0 20px 0; color: var(--text-secondary); font-size: 14px; line-height: 1.5; }
    .lead-form { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .lead-form label { display: block; }
    .lead-form .full { grid-column: 1 / -1; }
    .lead-form span { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-tertiary); font-family: ui-monospace, SFMono-Regular, monospace; margin-bottom: 4px; }
    .lead-form input {
      width: 100%; padding: 11px 14px;
      background: var(--bg-input); border: 1px solid var(--border-base);
      border-radius: 8px; color: var(--text-primary); font-size: 14px;
    }
    .lead-form input:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
    .lead-success {
      padding: 18px; border-radius: 10px;
      background: rgba(60,184,120,0.06); border: 1px solid rgba(60,184,120,0.25);
      color: var(--green); font-size: 14px; line-height: 1.5;
    }
    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      .result-head { flex-direction: column; }
      .score { padding-left: 0; padding-top: 16px; border-left: none; border-top: 1px solid var(--border-strong); text-align: left; }
      .findings, .lead-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <span class="brand-name">AVERROW</span>
      <span class="brand-tag">Domain Scan</span>
    </div>

    <h1>How exposed is <span class="accent">your domain</span>?</h1>
    <p class="lede">
      Free 30-second scan. Checks email auth posture, lookalike domains,
      and threat-feed mentions. No login required. We never share your
      domain with anyone.
    </p>

    <form id="scan-form" class="form" onsubmit="return runScan(event)">
      <input type="text" id="domain-input" placeholder="example.com" required autocomplete="off">
      <button type="submit" class="btn" id="scan-btn">Scan</button>
    </form>
    <div class="hint">Try acme.com, microsoft.com, your own.</div>

    <div id="error" class="error" hidden></div>
    <div id="loading" class="loading" hidden>Running scan…</div>
    <div id="result" hidden></div>
    <div id="next-step" hidden></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Pre-fill from query string ?domain=example.com
    const qs = new URLSearchParams(window.location.search);
    const presetDomain = qs.get('domain');
    if (presetDomain) {
      $('domain-input').value = presetDomain;
      // Auto-run on direct link. The inline script lives at end of
      // <body> so DOMContentLoaded has already fired by the time we
      // get here — call runScan directly.
      runScan(new Event('auto'));
    }

    async function runScan(ev) {
      ev.preventDefault();
      const domain = $('domain-input').value.trim().toLowerCase();
      if (!domain || !domain.includes('.')) {
        showError('Enter a valid domain like acme.com');
        return false;
      }
      hideError();
      $('result').hidden = true;
      $('next-step').hidden = true;
      $('loading').hidden = false;
      $('scan-btn').disabled = true;

      try {
        const res = await fetch('/api/brand-scan/public', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ domain }),
        });
        const body = await res.json();
        if (!res.ok || !body.success) {
          throw new Error(body.error || `Scan failed (${res.status})`);
        }
        renderResult(body.data);
      } catch (err) {
        showError(err.message || 'Couldn\'t complete the scan. Try again in a moment.');
      } finally {
        $('loading').hidden = true;
        $('scan-btn').disabled = false;
      }
      return false;
    }

    function pillFor(level) {
      const cls = ({ low: 'pill-low', medium: 'pill-medium', high: 'pill-high', critical: 'pill-critical' })[level] || 'pill-medium';
      return `<span class="pill ${cls}">${level}</span>`;
    }

    function renderResult(d) {
      const r = $('result');
      const lookalikesText = d.lookalikesPossible > 0
        ? `${d.lookalikesPossible} pattern${d.lookalikesPossible === 1 ? '' : 's'} could be registered`
        : 'No common patterns generated';
      const feedText = d.feedMentions
        ? 'Found in threat feeds — investigate'
        : 'No recent threat-feed mentions';
      r.innerHTML = `
        <div class="result-head">
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);font-family:ui-monospace,SFMono-Regular,monospace;margin-bottom:6px;">Trust posture</div>
            <div style="font-size:22px;font-weight:700;">${escapeHtml(d.domain)}</div>
            <div style="margin-top:8px;">${pillFor(d.riskLevel)}</div>
          </div>
          <div class="score">
            <div class="score-value">${d.trustScore}</div>
            <div class="score-label">/ 100</div>
          </div>
        </div>
        <div class="findings">
          <div class="finding">
            <div class="finding-label">Lookalike domains</div>
            <div class="finding-value">${d.lookalikesPossible}</div>
            <div class="finding-detail">${lookalikesText}</div>
          </div>
          <div class="finding">
            <div class="finding-label">Threat-feed mentions</div>
            <div class="finding-value">${d.feedMentions ? 'Yes' : 'None'}</div>
            <div class="finding-detail">${feedText}</div>
          </div>
        </div>
      `;
      r.hidden = false;
      renderNextStep(d.domain, d.riskLevel);
      // Update URL so the result is shareable
      const url = new URL(window.location.href);
      url.searchParams.set('domain', d.domain);
      window.history.replaceState({}, '', url.toString());
    }

    function renderNextStep(domain, riskLevel) {
      const ns = $('next-step');
      const headline = riskLevel === 'critical' || riskLevel === 'high'
        ? `These are the threats targeting ${escapeHtml(domain)}.`
        : `Want continuous monitoring for ${escapeHtml(domain)}?`;
      const sub = `Averrow watches your domain, takes down impersonations automatically, and surfaces dark-web mentions before they become incidents.`;
      ns.innerHTML = `
        <h2>${headline}</h2>
        <p>${sub}</p>
        <form id="lead-form" class="lead-form" onsubmit="return submitLead(event, '${escapeAttr(domain)}')">
          <label>
            <span>Name</span>
            <input type="text" id="lead-name" required autocomplete="name">
          </label>
          <label>
            <span>Work email</span>
            <input type="email" id="lead-email" required autocomplete="email">
          </label>
          <label class="full">
            <span>Company</span>
            <input type="text" id="lead-company" autocomplete="organization">
          </label>
          <div class="full" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <button type="submit" class="btn">Get a tailored brief</button>
            <span style="font-size:12px;color:var(--text-tertiary);">No spam. Unsubscribe anytime.</span>
          </div>
        </form>
        <div id="lead-error" class="error" hidden></div>
        <div id="lead-success" class="lead-success" hidden></div>
      `;
      ns.hidden = false;
    }

    async function submitLead(ev, domain) {
      ev.preventDefault();
      const name = $('lead-name').value.trim();
      const email = $('lead-email').value.trim();
      const company = $('lead-company').value.trim();
      const errEl = $('lead-error');
      const sucEl = $('lead-success');
      errEl.hidden = true;
      sucEl.hidden = true;

      try {
        const res = await fetch('/api/leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name, email,
            company: company || null,
            domain,
            form_type: 'scan_landing',
            source: '/scan',
          }),
        });
        const body = await res.json();
        if (!res.ok || !body.success) {
          throw new Error(body.error || `Couldn't capture (${res.status})`);
        }
        sucEl.textContent = `Thanks ${name.split(' ')[0]}. We'll send your tailored ${domain} brief to ${email} within one business day.`;
        sucEl.hidden = false;
        // Hide the form once submitted
        $('lead-form').hidden = true;
      } catch (err) {
        errEl.textContent = err.message || 'Couldn\'t submit. Try again.';
        errEl.hidden = false;
      }
      return false;
    }

    function showError(msg) {
      const e = $('error');
      e.textContent = msg;
      e.hidden = false;
    }
    function hideError() { $('error').hidden = true; }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/`/g, '&#96;');
    }
  </script>
</body>
</html>
