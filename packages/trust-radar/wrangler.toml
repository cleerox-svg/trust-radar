name = "trust-radar"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Static Assets (SPA frontend) ────────────────────────────
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ─── Routes ──────────────────────────────────────────────────
routes = [
  { pattern = "lrxradar.com", custom_domain = true },
  { pattern = "www.lrxradar.com", custom_domain = true }
]

# ─── Cron Triggers (automated feed ingestion) ────────────────
[triggers]
crons = ["*/5 * * * *"]

# ─── D1 Databases (v2 — fresh databases) ─────────────────────
[[d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"

# ─── KV Namespace (cache) ────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "$RADAR_KV_NAMESPACE_ID"

# ─── R2 Storage (evidence archives, feed snapshots) ──────────
# [[r2_buckets]]
# binding = "EVIDENCE"
# bucket_name = "trust-radar-evidence"

# ─── Durable Objects (WebSocket push hub) ────────────────────
[[durable_objects.bindings]]
name = "THREAT_PUSH_HUB"
class_name = "ThreatPushHub"

[[migrations]]
tag = "v1-threat-push-hub"
new_classes = ["ThreatPushHub"]

# ─── Environment variables ────────────────────────────────────
[vars]
ENVIRONMENT = "production"
LRX_API_URL = "https://api.lrx.io"

# ─── Secrets (set via: wrangler secret put <NAME>) ────────────
# JWT_SECRET
# VIRUSTOTAL_API_KEY
# LRX_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET

# ─── Staging environment ─────────────────────────────────────
[env.staging]
name = "trust-radar-staging"
routes = [
  { pattern = "staging.lrxradar.com", custom_domain = true }
]
vars = { ENVIRONMENT = "staging", LRX_API_URL = "https://api.lrx.io" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[env.staging.d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"

# ─── Local dev overrides ─────────────────────────────────────
[env.dev]
name = "trust-radar-dev"
vars = { ENVIRONMENT = "development", LRX_API_URL = "http://localhost:8000" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[env.dev.d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
