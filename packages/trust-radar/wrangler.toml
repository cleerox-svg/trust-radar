name = "trust-radar"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Observability (Workers Logs) ────────────────────────────
# Enables Workers Logs so we can tail invocations and capture errors like
# the `503 DNS cache overflow` that surfaced on /api/internal/platform-diagnostics.
# Top-level + traces stay disabled; only logs are persisted.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# ─── Routes ──────────────────────────────────────────────────
routes = [
  { pattern = "averrow.com", custom_domain = true },
  { pattern = "www.averrow.com", custom_domain = true },
  { pattern = "averrow.ca", custom_domain = true },
  { pattern = "www.averrow.ca", custom_domain = true },
  { pattern = "trustradar.ca", custom_domain = true },
  { pattern = "www.trustradar.ca", custom_domain = true },
  { pattern = "lrxradar.com", custom_domain = true },
  { pattern = "www.lrxradar.com", custom_domain = true }
]

# ─── Static Assets (SPA frontend) ────────────────────────────
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"

# ─── Cron Triggers ───────────────────────────────────────────
# Hourly tick  (15min CPU limit) — Flight Control + full agent mesh
# Navigator    (30s CPU limit)   — DNS resolution + cube refresh + cache warming (agent, runs */5)
# Cube healer  (30s CPU limit)   — 30-day retroactive cube rebuild (6-hourly)
#
# Wave 1A: staggered to eliminate the :00 collision where hourly + Navigator +
# cube-healer all fired simultaneously, saturating the D1 writer and blocking
# user reads for 3-10s every hour.
#
# Schedule:     :00 Navigator | :07 hourly mesh | :12/:18/... cube-healer (6-hourly)
# Eliminated:   parity-checker dedicated cron (demoted to daily in Wave 6)
#
# NOTE: weekly auto-seeder (PR #875) is dispatched from inside the
# hourly orchestrator on Sunday 05:07 UTC, NOT a dedicated cron entry.
# The Cloudflare cron parser rejects '23 5 * * 0' with code 10100
# even though it's standard 5-field cron — see fix at PR-fixing-#875.
[triggers]
# `13 13 * * *` is the daily briefing — runs in its own scheduled
# invocation so it gets a fresh per-request CPU/wall budget instead
# of competing with the hourly mesh. Previously the briefing was
# gated inside the orchestrator at hour===13 and silently failed
# every day because runThreatFeedScan exhausted the budget before
# fetchComprehensiveBriefing could complete (~40 parallel cube +
# table queries). Confirmed via the briefing_status section of
# /api/internal/platform-diagnostics: zero `cron:daily` entries
# in threat_briefings between 2026-05-02 and 2026-05-05 despite
# the orchestrator firing every hour during that window.
# `19 */4 * * *` (greynoise) and `21 * * * *` (seclookup) are dedicated
# enrichment-feed triggers. Both feeds were death-looping inside the
# inline-sequential enrichment chain of the hourly orchestrator: their
# inter-call sleeps (greynoise 8×30s, seclookup 100×1s) pushed the shared
# worker past its wall-clock budget, the worker was killed, and the
# in-flight pull was reaped — silently, so the breaker never advanced and
# the feed sat overdue for 11h+ while still enabled. Same escape-hatch
# pattern as enricher (:08) / cartographer (:09) / strategist (:10): own
# cron = fresh per-invocation budget. Minutes 19/21 are off the */5
# Navigator grid and distinct from the other dedicated crons. greynoise at
# every-4h matches its 45/day community cap (8/run × 6 = 48); seclookup
# hourly drains its enrichment backlog. handleScheduled dispatches each by
# exact event.cron match (no minute gates — cron-audit-safe).
# `24 14 * * 1` is the tenant weekly digest (S4) — Mondays 14:24 UTC, own
# invocation per the dedicated-cron pattern. Gated on TENANT_DIGEST_MODE +
# per-brand weekly_digest opt-in + per-user intelligence_digest preference;
# KV week stamp dedups re-runs. Minute :24 is off the */5 Navigator grid
# and distinct from the other dedicated crons.
crons = ["7 * * * *", "8 * * * *", "9 * * * *", "10 */6 * * *", "11 */6 * * *", "13 */6 * * *", "14 */6 * * *", "15 */6 * * *", "16 0 * * *", "*/5 * * * *", "12 */6 * * *", "13 13 * * *", "17 * * * *", "19 */4 * * *", "21 * * * *", "24 14 * * 1"]

# ─── Workflows (durable multi-step processing) ──────────────
[[workflows]]
name = "cartographer-backfill"
binding = "CARTOGRAPHER_BACKFILL"
class_name = "CartographerBackfillWorkflow"

# CARTOGRAPHER_MAIN — durable wrapper for the cart agent's full
# 7-phase execute(). PR-M (2026-05-14) added the workflow class +
# binding + manual endpoint. PR-O will switch the `9 * * * *` cron
# from inline executeAgent to dispatchWorkflow against this binding.
# Until then, this binding is only invoked manually via
# POST /api/internal/agents/cartographer/main-workflow.
[[workflows]]
name = "cartographer-main"
binding = "CARTOGRAPHER_MAIN"
class_name = "CartographerMainWorkflow"

[[workflows]]
name = "nexus-run"
binding = "NEXUS_RUN"
class_name = "NexusWorkflow"

# Durable GeoIP refresh — multi-step CSV import into GEOIP_DB.
# Triggered by the geoip_refresh agent (or POST /api/admin/geoip-refresh).
# Steps: verify-staging → load-locations → chunk-import → atomic-swap.
# Each step has its own retry policy so a single failed batch
# doesn't restart the whole 3.5M-row import.
[[workflows]]
name = "geoip-refresh"
binding = "GEOIP_REFRESH"
class_name = "GeoipRefreshWorkflow"

# ─── Queues (legacy ARCHITECT consumer — kept until CLI cleanup) ──
# The architect-analysis queue is no longer enqueued to (Phase 4 Step 1).
# The consumer binding MUST stay here until the Cloudflare-side consumer
# relationship is deregistered via CLI — removing it before that causes
# wrangler deploy to fail.
#
# Cleanup order (run from CLI, then delete this block + index.ts handler):
#   1. wrangler queues consumer remove architect-analysis trust-radar
#   2. wrangler queues delete architect-analysis
#   3. wrangler queues delete architect-analysis-dlq
#   4. Remove [[queues.consumers]] block below + no-op handler in index.ts
[[queues.consumers]]
queue = "architect-analysis"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 0
dead_letter_queue = "architect-analysis-dlq"

# ─── D1 Databases (v2 — fresh databases) ─────────────────────
[[d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
migrations_dir = "migrations-audit"

# ─── GeoIP reference DB (MaxMind GeoLite2 ranges) ────────────
# Third-tier geo provider: cartographer queries this when ip-api.com
# and ipinfo.io can't return lat/lng for a malicious IP (today: ~93%
# of malicious IPs from those two providers). Lives in a dedicated D1
# so the ~5M-row range table doesn't compete with main `trust-radar-v2`
# read budget.
#
# Operator runbook (Phase 3.5 — minimal, three steps):
#   1. wrangler d1 create geoip-db
#   2. Copy the returned database_id into the block below + uncomment
#   3. wrangler d1 migrations apply geoip-db --remote
#
# After deploy, the geoip_refresh agent auto-polls MaxMind weekly
# (Sunday 02:07 UTC) and only re-imports when MaxMind ships a new
# release (compared via the .sha256 fingerprint). To trigger a
# manual refresh:
#   POST /api/admin/geoip-refresh
# To force a reload (bypass the version guard):
#   POST /api/admin/geoip-refresh   with body { "forceReload": true }
#
# Until step 2 is uncommented, GEOIP_DB is undefined and the lookup
# helper (lib/geoip-mmdb.ts) returns null — cartographer falls
# through to its normal pipeline. No regression for environments
# that haven't enabled the binding.

[[d1_databases]]
binding = "GEOIP_DB"
database_name = "geoip-db"
database_id = "f47a6b18-b343-46d9-87e8-ef8ef4aa8521"
migrations_dir = "migrations-geoip"

# ─── DNS resolution work queue ──────────────────────────────
# Side D1 that holds the "needs DNS resolution" subset of threats.
# Lets the heavy dns-backfill SELECT + UPDATE cycle run against a
# 17K-row dedicated table with its own 25B-row/month budget instead
# of competing with the main `trust-radar-v2` budget.
#
# Pre-stage state (this commit): DB created, schema stamped, binding
# active — no code reads/writes the table yet. The migration in
# migrations-dns-queue/0001_initial.sql is the source of truth.
#
# Cutover path (subsequent PRs):
#   PR-2: dual-write — ingest hooks INSERT into dns_queue alongside
#         the existing threats-table writes. Drain logic still reads
#         from threats. Run 24h, diff the two for parity.
#   PR-3: flip reads — lib/dns-backfill.ts SELECT / UPDATE / DELETE
#         against dns_queue; resolved IPs still write back to the main
#         threats row.
#   PR-4: cleanup — remove dual-write, drop idx_threats_dns_pending_strict
#         + idx_threats_dns_backfill from the main DB, ANALYZE.
#
# Until PR-3 ships, the binding is a no-op — defining it now lets
# downstream PRs evolve schema and queries without binding churn.
[[d1_databases]]
binding = "DNS_QUEUE_DB"
database_name = "trust-radar-dns-queue"
database_id = "b2c6dae6-26d4-4d03-b3ff-08709bcf04c9"
migrations_dir = "migrations-dns-queue"

# ─── KV Namespace (cache) ────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "2f168effdbf54d3b913a1070524d6cc1"

# ─── Workers Analytics Engine (per-endpoint D1 read attribution) ──
# Cheap high-cardinality counter sink — each handler that opts in
# writes its rows_read total per request. Surfaced via the GraphQL
# Analytics API in platform-diagnostics's d1_metrics_24h block.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "trust_radar_d1_reads"

# ─── R2 Storage (evidence archives, feed snapshots) ──────────
# [[r2_buckets]]
# binding = "EVIDENCE"
# bucket_name = "trust-radar-evidence"

# ─── R2 Storage (GeoIP staging) ──────────────────────────────
# Used by BOTH GeoIP import paths:
#   1. Manual import: the operator downloads
#      `GeoLite2-City-CSV_<release>.zip` via their browser session,
#      uploads it here, then triggers
#      `POST /api/admin/geoip/import-from-r2?key=<key>&sha256=<hex>`.
#   2. Auto-poll (weekly) refresh: the GeoipRefreshWorkflow streams
#      the MaxMind archive to this bucket in ONE metered download
#      (step stage-to-r2), then Range-reads it from R2 for the import.
#      This caps MaxMind requests at one GET/refresh — Range-reading
#      MaxMind's metered endpoint directly previously tripped the
#      daily download quota. See workflows/geoipRefresh.ts.
[[r2_buckets]]
binding = "GEOIP_STAGING"
bucket_name = "geoip-staging"

# ─── R2 Storage (tenant-uploaded trademark assets — logos/wordmarks) ──
# Customer-uploaded logo/wordmark images for the Trademark module. The
# upload endpoint stores raw bytes here keyed by org/brand/asset; the
# image-serve endpoint streams them back (auth-gated). pHash is computed
# in Phase 2 from these stored bytes. See docs/TRADEMARK_MONITORING.md.
[[r2_buckets]]
binding = "TRADEMARK_ASSETS"
bucket_name = "trust-radar-trademark-assets"

# ─── Durable Objects (WebSocket push hub + CertStream monitor) ──
[[durable_objects.bindings]]
name = "THREAT_PUSH_HUB"
class_name = "ThreatPushHub"

[[durable_objects.bindings]]
name = "CERTSTREAM_MONITOR"
class_name = "CertStreamMonitor"

[[migrations]]
tag = "v1-threat-push-hub"
new_classes = ["ThreatPushHub"]

[[migrations]]
tag = "v2-certstream-monitor"
new_classes = ["CertStreamMonitor"]

# ─── Subrequest limit ────────────────────────────────────────
# Cloudflare's paid-plan default is 10,000 subrequests per invocation.
# The hourly :07 tick runs the full agent mesh + all eligible feeds
# concurrently and exceeds that ceiling, which silently auto-pauses
# feeds (5 consecutive failures → enabled=0). Raised to 50,000 for
# headroom; max allowed is 10,000,000. Subrequests are not billed —
# this only affects the per-invocation cap.
[limits]
subrequests = 50_000
cpu_ms = 300_000

# ─── Environment variables ────────────────────────────────────
[vars]
ENVIRONMENT = "production"
# Takedown outbound email (S1, docs/IMPROVEMENT_PLAN_2026-06.md).
# 'draft' = queue drafts for manual ops send (safe default, pre-S1 behavior).
# 'live'  = email-send submitter delivers abuse reports via Resend from
#           takedowns@averrow.com. Owner flips this deliberately; flipping
#           back to 'draft' is the kill switch.
TAKEDOWN_SEND_MODE = "draft"
# Tenant weekly digest (S4, docs/IMPROVEMENT_PLAN_2026-06.md).
# 'off'  = digest cron is a no-op (safe default — outward email ships dark).
# 'live' = Monday 14:24 UTC cron emails each org with digest-enabled brands.
TENANT_DIGEST_MODE = "off"

# ─── Secrets (set via: wrangler secret put <NAME>) ────────────
# ANTHROPIC_API_KEY        — Anthropic API key for Claude Haiku AI analysis
# ANTHROPIC_ADMIN_KEY      — Anthropic Admin API key (optional — budget verification)
# JWT_SECRET
# VIRUSTOTAL_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# RESEND_API_KEY           — Resend API key for briefing email delivery
# AVERROW_INTERNAL_SECRET  — bearer token for /api/internal/* endpoints
#                            (must match the value used by averrow-mcp +
#                            scripts/platform-diagnostics.sh)
# INTEGRATION_CONFIG_KEY   — AES-256 master key for org_integrations.config_encrypted
#                            (32 random bytes, base64-encoded). MUST be set before
#                            any integration Create/Update; the encryption helper
#                            refuses to fall back to plaintext if absent.
#                            Generate with:
#                              head -c 32 /dev/urandom | base64
#                            After deploy, run once to encrypt legacy plaintext rows:
#                              curl -X POST $SITE/api/admin/integrations/rewrap \
#                                -H "Authorization: Bearer <super-admin JWT>"

# ─── Staging environment ─────────────────────────────────────
[env.staging]
name = "trust-radar-staging"
routes = [
  { pattern = "staging.averrow.com", custom_domain = true },
  { pattern = "staging.trustradar.ca", custom_domain = true }
]
vars = { ENVIRONMENT = "staging" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[env.staging.d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
migrations_dir = "migrations-audit"

# ─── Local dev overrides ─────────────────────────────────────
[env.dev]
name = "trust-radar-dev"
vars = { ENVIRONMENT = "development" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[env.dev.d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
migrations_dir = "migrations-audit"

[[r2_buckets]]
binding = "ARCHITECT_BUNDLES"
bucket_name = "averrow-architect-bundles"
