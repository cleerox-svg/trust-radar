name = "trust-radar"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Routes ──────────────────────────────────────────────────
routes = [
  { pattern = "averrow.com", custom_domain = true },
  { pattern = "www.averrow.com", custom_domain = true },
  { pattern = "averrow.ca", custom_domain = true },
  { pattern = "www.averrow.ca", custom_domain = true },
  { pattern = "trustradar.ca", custom_domain = true },
  { pattern = "www.trustradar.ca", custom_domain = true },
  { pattern = "lrxradar.com", custom_domain = true },
  { pattern = "www.lrxradar.com", custom_domain = true }
]

# ─── Static Assets (SPA frontend) ────────────────────────────
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"

# ─── Cron Triggers (automated feed ingestion) ────────────────
# Hourly cron (15min CPU limit) — agents handle their own scheduling internally
[triggers]
crons = ["0 * * * *"]

# ─── Workflows (durable multi-step processing) ──────────────
[[workflows]]
name = "cartographer-backfill"
binding = "CARTOGRAPHER_BACKFILL"
class_name = "CartographerBackfillWorkflow"

[[workflows]]
name = "nexus-run"
binding = "NEXUS_RUN"
class_name = "NexusWorkflow"

# ─── D1 Databases (v2 — fresh databases) ─────────────────────
[[d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
migrations_dir = "migrations-audit"

# ─── KV Namespace (cache) ────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "2f168effdbf54d3b913a1070524d6cc1"

# ─── R2 Storage (evidence archives, feed snapshots) ──────────
# [[r2_buckets]]
# binding = "EVIDENCE"
# bucket_name = "trust-radar-evidence"

# ─── Durable Objects (WebSocket push hub + CertStream monitor) ──
[[durable_objects.bindings]]
name = "THREAT_PUSH_HUB"
class_name = "ThreatPushHub"

[[durable_objects.bindings]]
name = "CERTSTREAM_MONITOR"
class_name = "CertStreamMonitor"

[[migrations]]
tag = "v1-threat-push-hub"
new_classes = ["ThreatPushHub"]

[[migrations]]
tag = "v2-certstream-monitor"
new_classes = ["CertStreamMonitor"]

# ─── Environment variables ────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ─── Secrets (set via: wrangler secret put <NAME>) ────────────
# ANTHROPIC_API_KEY    — Anthropic API key for Claude Haiku AI analysis
# ANTHROPIC_ADMIN_KEY  — Anthropic Admin API key (optional — budget verification)
# JWT_SECRET
# VIRUSTOTAL_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET

# ─── Staging environment ─────────────────────────────────────
[env.staging]
name = "trust-radar-staging"
routes = [
  { pattern = "staging.averrow.com", custom_domain = true },
  { pattern = "staging.trustradar.ca", custom_domain = true }
]
vars = { ENVIRONMENT = "staging" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[env.staging.d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
migrations_dir = "migrations-audit"

# ─── Local dev overrides ─────────────────────────────────────
[env.dev]
name = "trust-radar-dev"
vars = { ENVIRONMENT = "development" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "trust-radar-v2"
database_id = "a3776a5f-c07c-4e20-9f3b-8d7f8c7f90c6"
migrations_dir = "migrations"

[[env.dev.d1_databases]]
binding = "AUDIT_DB"
database_name = "trust-radar-v2-audit"
database_id = "55d58eff-47f3-4533-afa4-e52d494376e0"
migrations_dir = "migrations-audit"
