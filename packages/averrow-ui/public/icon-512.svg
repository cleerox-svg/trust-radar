<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32">
  <!-- Maskable variant: full-bleed background, no rounded corners.
       The launcher (Android adaptive icons) applies its own mask;
       the chevron sits within the inner ~80% safe zone. -->
  <rect width="32" height="32" fill="#080E18"/>
  <defs>
    <linearGradient id="deep-arrow" x1="16" y1="6" x2="16" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6B1010"/>
      <stop offset="100%" stop-color="#C83C3C"/>
    </linearGradient>
  </defs>
  <path d="M16 6.5L25 25.5H18L16 21L14 25.5H7Z" fill="url(#deep-arrow)"/>
  <path d="M14.7 22H17.3L16 18.5Z" fill="#080E18"/>
</svg>
