name = "averrow-mcp"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Secrets (set via `wrangler secret put` or Cloudflare dashboard):
#   AVERROW_INTERNAL_SECRET  — must match the value set on the trust-radar worker
#   MCP_AUTH_TOKEN            — bearer token Claude Code sends to authenticate with this MCP server
#   MCP_TEST_JWT              — long-lived access JWT for a dedicated test user
#                               account. Required by verify_ui_smoke + assert_endpoint
#                               tools. Rotate from a logged-in browser session:
#                               localStorage.getItem('averrow_token'). Default JWT
#                               TTL is 12h, so rotation is manual until refresh-
#                               token handling lands.

# Deploy:
#   cd packages/averrow-mcp
#   wrangler deploy
#
# Or paste src/index.ts into Cloudflare Dashboard → Workers → Create → Quick Edit
